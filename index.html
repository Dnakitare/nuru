<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>fumbo · knot inspector</title>
    <style>
      :root {
        --field: #0a0e14;
        --raised: #10161f;
        --line: #232e3b;
        --ink: #c8d2dc;
        --ink-dim: #8d97a4;    /* ~4.6:1 on raised — safe for small body text */
        --ink-faint: #3d4756;  /* non-text only: dots, hairlines */
        --true: #6fe3c4;
        --true-glow: #6fe3c455;
        --false: #37424f;
        --false-edge: #5f7082; /* gives the false disc a visible edge */
        --unknown: #7c8ca1;    /* the hollow-ring stroke; must read on field */
        --anchor: #f0c674;
        --anchor-glow: #f0c67433;
        --anchor-off: #241d0f; /* dim fill of a "given false" pin */
        --strain: #e0566a;
        --mono: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
        --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background:
          radial-gradient(1200px 800px at 30% -10%, #101a26 0%, transparent 60%),
          var(--field);
        color: var(--ink);
        font-family: var(--sans);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      .wrap {
        display: grid;
        grid-template-columns: 1fr 340px;
        gap: 1px;
        background: var(--line);
        height: 100vh;
      }
      @media (max-width: 820px) {
        .wrap { grid-template-columns: 1fr; grid-template-rows: auto auto; height: auto; min-height: 100vh; }
      }
      .stage { position: relative; background: var(--field); overflow: hidden; }
      #knot { width: 100%; height: 100%; display: block; touch-action: manipulation; }

      /* wordmark */
      .brand {
        position: absolute; top: 22px; left: 26px; z-index: 3;
        font-family: var(--mono); font-size: 15px; letter-spacing: 0.42em;
        color: var(--ink-dim); text-transform: lowercase; user-select: none;
      }
      .brand b { color: var(--true); font-weight: 600; }
      .stage-note {
        position: absolute; bottom: 18px; left: 26px; z-index: 3;
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em;
        color: var(--ink-dim); max-width: 60%;
      }
      .demo-bar {
        position: absolute; bottom: 46px; left: 50%; transform: translateX(-50%) translateY(8px);
        z-index: 5; opacity: 0; pointer-events: none;
        background: rgba(12, 18, 26, 0.92); border: 1px solid var(--line);
        border-left: 2px solid var(--anchor);
        padding: 11px 18px; border-radius: 4px; max-width: 78%;
        font-family: var(--mono); font-size: 13px; letter-spacing: 0.02em; color: var(--ink);
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      .demo-bar.show { opacity: 1; transform: translateX(-50%) translateY(0); }
      .demo-bar .lead { color: var(--anchor); }

      /* right rail */
      .rail { background: var(--raised); display: flex; flex-direction: column; min-height: 0; }
      .rail section { padding: 20px 22px; border-bottom: 1px solid var(--line); }
      .rail .grow { flex: 1; min-height: 0; overflow-y: auto; }

      .timer { font-family: var(--mono); }
      .timer .t { font-size: 42px; letter-spacing: 0.02em; color: var(--ink); font-variant-numeric: tabular-nums; }
      .timer .t.solved { color: var(--true); }
      .timer .sub { font-size: 11px; color: var(--ink-dim); letter-spacing: 0.14em; text-transform: lowercase; margin-top: 4px; }

      .label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em; color: var(--ink-dim); text-transform: lowercase; margin-bottom: 12px; }

      .tiers { display: flex; gap: 6px; }
      .tiers button {
        flex: 1; background: transparent; border: 1px solid var(--line); color: var(--ink-dim);
        font-family: var(--mono); font-size: 13px; padding: 8px 0; border-radius: 3px; cursor: pointer;
        transition: all 0.15s ease;
      }
      .tiers button:hover { border-color: var(--unknown); color: var(--ink); }
      .tiers button[aria-pressed="true"] { border-color: var(--true); color: var(--true); background: var(--true-glow); }

      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .actions button {
        background: transparent; border: 1px solid var(--line); color: var(--ink);
        font-family: var(--sans); font-size: 13px; padding: 8px 14px; border-radius: 3px; cursor: pointer;
        transition: all 0.15s ease; letter-spacing: 0.01em;
      }
      .actions button:hover:not(:disabled) { border-color: var(--unknown); background: #0d1219; }
      .actions button:disabled { opacity: 0.35; cursor: default; }
      .actions button.primary { border-color: var(--true); color: var(--true); }
      .actions button.primary:hover:not(:disabled) { background: var(--true-glow); }

      .status { font-family: var(--mono); font-size: 12px; line-height: 1.7; color: var(--ink-dim); }
      .status .now { color: var(--ink); }
      .status .now.strain { color: var(--strain); }
      .status .now.solved { color: var(--true); }
      .vec { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; margin-top: 10px; font-size: 11.5px; }
      .vec dt { color: var(--ink-dim); }
      .vec dd { margin: 0; color: var(--ink); text-align: right; font-variant-numeric: tabular-nums; }

      .rules { font-family: var(--mono); font-size: 12px; line-height: 1.5; }
      .rules .rule {
        display: flex; gap: 8px; padding: 5px 8px; border-radius: 3px; color: var(--ink-dim);
        border-left: 2px solid transparent;
      }
      .rules .rule .tid { color: var(--ink-dim); }
      .rules .rule span { min-width: 0; overflow-wrap: anywhere; }
      .rules .rule.strain { color: var(--strain); border-left-color: var(--strain); background: #1a0f13; }
      .rules .rule.hint { color: var(--anchor); border-left-color: var(--anchor); background: var(--anchor-glow); animation: shimmer 1.4s ease-in-out infinite; }
      @keyframes shimmer { 0%, 100% { opacity: 0.55; } 50% { opacity: 1; } }
      .rules .given { color: var(--anchor); }

      .sigil-panel { position: absolute; inset: 0; z-index: 4; display: none; place-items: center; background: radial-gradient(600px 600px at 50% 45%, #0d1a1f 0%, var(--field) 70%); }
      .sigil-panel.show { display: grid; animation: fadein 0.5s ease; }
      @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
      .sigil-panel .caption { position: absolute; bottom: 12%; text-align: center; font-family: var(--mono); color: var(--ink-dim); font-size: 13px; letter-spacing: 0.12em; }
      .sigil-panel .caption .big { color: var(--true); font-size: 20px; display: block; margin-bottom: 6px; }

      /* how-to-play affordance */
      .stage-link {
        position: absolute; top: 20px; right: 22px; z-index: 3;
        background: none; border: 1px solid var(--line); color: var(--ink-dim);
        font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em;
        padding: 6px 12px; border-radius: 3px; cursor: pointer; text-transform: lowercase;
      }
      .stage-link:hover { color: var(--ink); border-color: var(--unknown); }

      /* walkthrough */
      .wt-root { position: fixed; inset: 0; z-index: 50; }
      .wt-panel { position: fixed; background: rgba(6, 9, 14, 0.86); }
      .wt-ring {
        position: fixed; display: none; border-radius: 12px; border: 1px solid var(--true);
        box-shadow: 0 0 22px var(--true-glow), inset 0 0 22px var(--true-glow); pointer-events: none;
      }
      .wt-card {
        position: fixed; z-index: 52; width: min(400px, 92vw); background: var(--raised);
        border: 1px solid var(--line); border-radius: 10px; padding: 22px 24px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.55);
      }
      .wt-card.center { left: 50%; top: 50%; transform: translate(-50%, -50%); }
      .wt-card.bottom { left: 50%; bottom: 48px; transform: translateX(-50%); }
      .wt-card h3 { font-family: var(--mono); font-size: 12px; letter-spacing: 0.18em; color: var(--true); text-transform: lowercase; margin: 0 0 12px; }
      .wt-card p { margin: 0 0 18px; font-size: 14.5px; line-height: 1.65; color: var(--ink); }
      .wt-foot { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .wt-skip { background: none; border: none; color: var(--ink-dim); font-family: var(--sans); font-size: 12px; cursor: pointer; padding: 4px; }
      .wt-skip:hover { color: var(--ink); }
      .wt-dots { display: flex; gap: 6px; }
      .wt-dots i { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-faint); transition: background 0.2s; }
      .wt-dots i.on { background: var(--true); }
      .wt-btns { display: flex; gap: 8px; }
      .wt-btns button { background: transparent; border: 1px solid var(--line); color: var(--ink); font-family: var(--sans); font-size: 13px; padding: 7px 14px; border-radius: 3px; cursor: pointer; }
      .wt-btns button:hover { border-color: var(--unknown); background: #0d1219; }
      .wt-btns button.primary { border-color: var(--true); color: var(--true); }
      .wt-btns button.primary:hover { background: var(--true-glow); }

      /* visible keyboard focus everywhere (was missing) */
      :focus-visible { outline: 2px solid var(--true); outline-offset: 2px; border-radius: 3px; }
      .thread:focus-visible { outline: 2px solid var(--true); outline-offset: 1px; }
      /* solved sigil: responsive + luminous, matching the thread language */
      #sigil { width: min(380px, 82vw); height: min(380px, 82vw); filter: drop-shadow(0 0 10px var(--true-glow)); }

      @media (max-width: 820px) {
        .brand-sfx { display: none; }
        .stage { min-height: 60vh; }
        .rail .grow { overflow: visible; }
        .stage-note { display: none; }
        .demo-bar { max-width: 90%; font-size: 12px; bottom: 20px; }
        .timer .t { font-size: 34px; }
        .wt-card.bottom { bottom: 24px; }
        /* 44px touch targets */
        .actions button, .tiers button, .stage-link { min-height: 44px; }
      }
      /* short / landscape phones: keep two columns so the knot isn't letterboxed */
      @media (max-height: 560px) and (max-width: 820px) {
        .wrap { grid-template-columns: 1fr 300px; grid-template-rows: auto; height: 100vh; }
        .stage { min-height: 0; }
        .rail { overflow-y: auto; }
        .rail .grow { overflow-y: auto; }
      }
      @media (max-width: 400px) {
        .rail section { padding: 16px 16px; }
        .brand { left: 18px; }
        .stage-link { right: 16px; }
      }

      @media (prefers-reduced-motion: reduce) { *, .wt-spot { animation: none !important; transition: none !important; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="stage">
        <div class="brand"><b>fumbo</b><span class="brand-sfx"> · knot inspector</span></div>
        <button class="stage-link" id="btnGuide">how to play</button>
        <svg id="knot" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet" aria-label="constraint knot"></svg>
        <div class="stage-note" id="note">pull a thread taut (true) or let it fall slack (false). the knot strains where a claim collides.</div>
        <div class="demo-bar" id="demoBar" aria-live="polite"></div>
        <div class="sigil-panel" id="sigilPanel">
          <svg id="sigil" viewBox="-1.2 -1.2 2.4 2.4" width="380" height="380" aria-label="solved sigil"></svg>
          <div class="caption"><span class="big" id="sigilTime"></span><span id="sigilSig"></span></div>
        </div>
      </div>

      <aside class="rail">
        <section class="timer">
          <div class="t" id="timer">0.0<span style="font-size:20px">s</span></div>
          <div class="sub" id="timerSub">solving</div>
        </section>

        <section>
          <div class="label">depth</div>
          <div class="tiers" id="tiers"></div>
          <div class="actions" style="margin-top:14px">
            <button class="primary" id="btnNew">new knot</button>
            <button id="btnDemo">watch a solve</button>
            <button id="btnHint">hint</button>
            <button id="btnReveal">reveal</button>
          </div>
        </section>

        <section class="status">
          <div>state <span class="now" id="stateNow" aria-live="polite">…</span></div>
          <dl class="vec" id="vec"></dl>
        </section>

        <section class="grow">
          <div class="label">the reasons</div>
          <div class="rules" id="rules"></div>
        </section>
      </aside>
    </div>
    <script type="module" src="/src/web/main.ts"></script>
  </body>
</html>
