<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>daily grid · fumbo engine</title>
    <style>
      :root {
        --bg: #f6f4ee; --panel: #fffdf8; --line: #e3ddd0; --ink: #2b2a26; --ink-dim: #7a756b;
        --accent: #d98a2b; --accent-soft: #f6e6cf; --full: #2b2a26; --empty: #d98a2b; --bad: #d1584e;
        --sans: ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif;
        --mono: ui-monospace, "SF Mono", Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); }
      .nav { display: flex; gap: 4px; align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--line); font-family: var(--mono); font-size: 13px; }
      .nav a { color: var(--ink-dim); text-decoration: none; padding: 5px 10px; border-radius: 6px; }
      .nav a.here { color: var(--accent); background: var(--accent-soft); font-weight: 600; }
      .nav a:hover { color: var(--ink); }
      .wrap { max-width: 560px; margin: 0 auto; padding: 28px 20px 60px; text-align: center; }
      h1 { font-size: 26px; margin: 6px 0 2px; letter-spacing: -0.01em; }
      .tag { color: var(--ink-dim); font-size: 15px; margin: 0 0 24px; }
      .boardwrap { display: flex; justify-content: center; }
      #board { position: relative; margin: 0 auto; }
      .cell {
        position: absolute; width: 58px; height: 58px; border: 1.5px solid var(--line); border-radius: 12px;
        background: var(--panel); cursor: pointer; font-size: 26px; line-height: 1; color: transparent;
        transition: transform 0.08s, background 0.12s; padding: 0;
      }
      .cell:hover:not(:disabled) { transform: scale(1.05); }
      .cell.full { color: var(--full); }
      .cell.empty { color: var(--empty); }
      .cell.given { background: var(--accent-soft); border-color: var(--accent-soft); cursor: default; }
      .cell.strain { border-color: var(--bad); background: #f7dcd8; }
      .link {
        position: absolute; transform: translate(-50%, -50%); z-index: 3;
        width: 22px; height: 22px; border-radius: 50%; background: var(--ink); color: var(--panel);
        font-family: var(--mono); font-size: 14px; font-weight: 700; display: grid; place-items: center; pointer-events: none;
      }
      .now { min-height: 24px; margin: 24px 0 6px; font-size: 16px; font-family: var(--mono); color: var(--ink-dim); }
      .now.win { color: var(--accent); font-weight: 600; }
      .now.bad { color: var(--bad); }
      .controls { display: flex; gap: 10px; justify-content: center; align-items: center; margin-top: 14px; }
      button.act { font-family: var(--sans); font-size: 14px; padding: 9px 16px; border: 1px solid var(--line); background: var(--panel); border-radius: 8px; cursor: pointer; color: var(--ink); }
      button.act:hover { border-color: var(--accent); color: var(--accent); }
      .diff { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); }
      .how { margin-top: 26px; font-size: 13px; color: var(--ink-dim); line-height: 1.7; }
      .how b { color: var(--ink); font-weight: 600; }
      .how code { background: var(--accent-soft); padding: 1px 6px; border-radius: 4px; color: var(--ink); }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #16171a; --panel: #202227; --line: #2e3138; --ink: #e6e3dc; --ink-dim: #9a958a; --full: #e6e3dc; --accent-soft: #3a2c14; }
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="/skins.html">← skins</a>
      <a href="/mines.html">minesweeper</a>
      <a href="/grid.html" class="here">grid</a>
      <a href="/index.html">knot</a>
    </nav>
    <div class="wrap">
      <h1>daily grid</h1>
      <p class="tag">fill every cell with ● or ○, deduced — never guessed.</p>
      <div class="boardwrap"><div id="board"></div></div>
      <div class="now" id="now">…</div>
      <div class="controls">
        <button class="act" id="new">new grid</button>
        <span class="diff" id="diff"></span>
      </div>
      <p class="how">
        each row and column holds <b>three of each</b> · <b>no three in a row</b> ·
        <code>=</code> cells match, <code>×</code> cells differ.<br />tap a cell to cycle ● → ○ → empty.
      </p>
    </div>
    <script type="module" src="/src/web/skins/grid.ts"></script>
  </body>
</html>
